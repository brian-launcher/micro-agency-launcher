<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuickRyan Biz</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  body, html {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: 'Poppins', sans-serif;
  }

  .banner {
    height: 100vh;
    background: url('laptop-bg.jpg') no-repeat center center/cover;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    color: white;
    padding: 20px;
  }

  .banner-content {
    background: rgba(0,0,0,0.6);
    padding: 40px;
    border-radius: 15px;
    max-width: 600px;
  }

  .banner h1 {
    font-size: 2em;
    margin-bottom: 15px;
  }

  .banner p {
    font-size: 1.2em;
    margin-bottom: 25px;
  }

  .whatsapp-btn {
    display: inline-block;
    background-color: #25D366;
    color: white;
    font-weight: 600;
    text-decoration: none;
    padding: 12px 25px;
    border-radius: 50px;
    transition: 0.3s;
  }

  .whatsapp-btn:hover {
    background-color: #1ebe5b;
  }

  @media (max-width: 600px) {
    .banner h1 { font-size: 1.5em; }
    .banner p { font-size: 1em; }
  }
</style>
</head>
<body>

<div class="banner">
  <div class="banner-content">
    <h1>We Help Small Businesses Get More Customers Online</h1>
    <p>Affordable websites. Fast delivery. Professional design.</p>
